name: face_recognition
description: A Flutter project for face recognition
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  camera: 0.10.5+9
  permission_handler: ^11.3.0

  google_mlkit_face_detection: 0.13.1

  sqflite: ^2.3.3+1
  path: ^1.9.0
  image: ^4.1.0
  tflite_flutter: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

dependency_overrides:
  camera_android_camerax: 0.6.6

flutter:
  uses-material-design: true
  assets:
    - assets/models/mobilefacenet_112x112.tflite